services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: /ws
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
